env:
  load_dotenv: true

alpaca:
  paper: true
  # If false, only logs what it *would* do.
  execute: true

market_data:
  poll_seconds: 1.0

strategy:
  # Edge-trigger stop-loss in strategy: emit SL once until price recovers above stop + clear_bps.
  stop_loss:
    clear_bps: 15
  products:
    - symbol: "TSLL"
      qty: 1
      half_spread_bps: 10
      profit_target_pct: 0.006
      stop_loss_pct: 0.0045

    - symbol: "FNGU"
      qty: 1
      half_spread_bps: 10
      profit_target_pct: 0.006
      stop_loss_pct: 0.0045

runtime:
  queue_maxsize: 10000
  reconcile_seconds: 15.0
  shutdown_timeout_seconds: 10
  # After a stop-loss market sell, wait before placing a new entry BUY.
  post_stop_loss_flat_seconds: 20
  # Ignore duplicate SL / limit spam while Alpaca processes the market exit.
  stop_loss_exit_guard_seconds: 120

storage:
  sqlite_path: "data/alpaca_etf_scalper.sqlite3"
  schema_path: "mm_bot/sql/schema.sql"

