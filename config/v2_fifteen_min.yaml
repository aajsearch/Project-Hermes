# V2 fifteen_min: pipeline + strategies (strict schema)
# continuous_alpha_limit_99: 300s horizon (5 min → 0), absolute buffer stop-loss
fifteen_min:
  pipeline:
    run_interval_seconds: 1
    strategy_priority: [continuous_alpha_limit_99, atm_breakout_strategy]

  strategies:
    continuous_alpha_limit_99:
      enabled: true
      # Hunt from 300s (5 min) down to 0; bot evaluates every tick in this window
      window_seconds: { btc: 300, eth: 300, sol: 300, xrp: 300 }
      limit_price_cents: 99
      # Kept BTC/ETH tight, loosened SOL to 85 to capture more early 300s volume
      min_bid_cents: { btc: 85, eth: 80, sol: 85, xrp: 75 }
      order_count: { btc: 10, eth: 10, sol: 10, xrp: 10 }
      max_cost_cents: 10000
      side: auto
      stop_loss_pct: 15
      # Catastrophic override: if loss_pct >= catastrophic_loss_pct, fire stop-loss immediately (ignore distance).
      catastrophic_loss_pct: 25
      # NEW BUFFERS: Widened SOL and XRP to absorb their normal 300s background noise
      stop_loss_absolute_buffer: { btc: 15.0, eth: 1.0, sol: 0.10, xrp: 0.0015 }
      # NEW WALLS: Raised SOL and XRP so the buffer subtraction creates a mathematically safe Iron Floor
      min_distance_at_placement: { btc: 45.0, eth: 2.5, sol: 0.18, xrp: 0.0025 }

    # Legacy key (optional): strategy also reads last_90s_limit_99 if continuous_alpha_limit_99 missing
    # last_90s_limit_99:
    #   enabled: false
    #   window_seconds: { btc: 85, eth: 85, sol: 85, xrp: 85 }
    #   ...

    atm_breakout_strategy:
      enabled: false
      min_seconds_to_close: 120
      max_seconds_to_close: 840
      min_distance_at_placement: { btc: 60, eth: 3, sol: 0.25, xrp: 0.003 }
      min_entry_price: 55
      max_entry_price: 70
      max_entry_spread_cents: 10
      momentum_window_seconds: 90
      momentum_trigger_3s: { btc: 60.0, eth: 3, sol: 0.25, xrp: 0.003 }
      take_profit_cents: 85
      stop_loss_cents: 35
      order_count: 10
      max_cost_cents: 1000
      contracts: 10
