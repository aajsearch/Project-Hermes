# V2 fifteen_min: pipeline + strategies (strict schema)
# continuous_alpha_limit_99: 300s horizon (5 min → 0), absolute buffer stop-loss
fifteen_min:
  pipeline:
    run_interval_seconds: 1
    strategy_priority: [continuous_alpha_limit_99, knife_catcher, atm_breakout_strategy]

  strategies:
    continuous_alpha_limit_99:
      enabled: false
      window_seconds: { btc: 150, eth: 150, sol: 150, xrp: 150 }
      
      # --- 1. ENTRY CONSTRAINTS (The 85-95 Sweet Spot) ---
      limit_price_cents: 99
      min_bid_cents: { btc: 95, eth: 95, sol: 95, xrp: 95 }
      
      order_count: { btc: 100, eth: 100, sol: 100, xrp: 100 }
      max_cost_cents: 50000
      side: auto
      
      # --- EARLY EXIT TRIGGERS (Accounting for 8% Slippage) ---
      # Tuned from last 14 v2_strategy_reports SL rows (continuous_alpha_limit_99): BTC bled 19–29% on
      # mark while ref_dist stayed large, so distance gate blocked 15% until catastrophic. SOL/XRP refs
      # are tiny so distance arms easily; a few rows show <15% exit PnL (fills vs mark / timing).
      stop_loss_pct: 15
      distance_decay_pct: { btc: 0.88, eth: 0.88, sol: 0.88, xrp: 0.92 }
      # Hard ceiling before deep bleed (observed exits clustered under old 30%)
      catastrophic_loss_pct: 22
      # null = no distance gate for that asset → normal SL is mark-based 15% + persistence (last_90s.py)
      stop_loss_absolute_buffer: { btc: 5, eth: 0.25, sol: 0.04, xrp: 0.0008 }
      # --- ENTRY PREVENTION (Filtering out the noise) ---
      min_distance_at_placement: { btc: 55.0, eth: 2.0, sol: 0.1, xrp: 0.0025 }
      # Cancel resting entry if distance decays too much before fill (pre-fill adverse selection protection)
      resting_cancel_decay_pct: 0.35
      stop_loss_bad_fill : 10

      # --- 4. STATE TIMERS ---
      global_cooldown_seconds: 60
      danger_persistence_seconds: { btc: 1.0, eth: 1.0, sol: 1.0, xrp: 1.0 }

    # Legacy key (optional): strategy also reads last_90s_limit_99 if continuous_alpha_limit_99 missing
    # last_90s_limit_99:
    #   enabled: false
    #   window_seconds: { btc: 85, eth: 85, sol: 85, xrp: 85 }
    #   ...
    knife_catcher:
      enabled: false # this strategy is not working as expected so disable it for now
      # Operate in the same 5-minute window as our main strategy
      window_seconds: { btc: 300, eth: 300, sol: 300, xrp: 300 }
      
      # THE CRASH DETECTION (Sliding Window parameters)
      historic_high_bid: 80
      lookback_seconds: 60
      
      # THE ENTRY ZONE (Buy the MM panic)
      min_entry_cents: 20
      max_entry_cents: 45
      # Dynamic limit: place at bid + spread (avoids crossing a blown-out spread)
      max_entry_spread_cents: 5
      # Wash-trade safeguard: only fire after crash has sustained this long (lets continuous_alpha clear first)
      execution_delay_seconds: 3
      
      # DISTANCE GATE (Must pierce the Iron Floor to be a true flash crash)
      # Notice we use the calculated Iron Floors from our previous analysis
      min_distance_at_placement: { btc: 30.0, eth: 1.5, sol: 0.08, xrp: 0.0010 }
      # THE DEATH FLOOR: Do not catch the knife if the spot has crossed the strike by MORE than this amount.
      max_negative_distance_at_placement: { btc: -10.0, eth: -0.25, sol: -0.05, xrp: -0.00010 }
      # THE RESOLUTION (Exit Rules)
      take_profit_cents: 80
      stop_loss_cents: 10
      max_hold_seconds: 60
      
      # RISK SIZING (Start small to validate the wick dynamics)
      order_count: 1
      max_cost_cents: 100
      side: auto

   #! TO DO: Add atm_breakout_strategy   
    atm_breakout_strategy:
      enabled: false
      min_seconds_to_close: 120
      max_seconds_to_close: 840
      min_distance_at_placement: { btc: 60, eth: 3, sol: 0.25, xrp: 0.003 }
      min_entry_price: 55
      max_entry_price: 70
      max_entry_spread_cents: 10
      momentum_window_seconds: 90
      momentum_trigger_3s: { btc: 60.0, eth: 3, sol: 0.25, xrp: 0.003 }
      take_profit_cents: 85
      stop_loss_cents: 35
      order_count: 10
      max_cost_cents: 1000
      contracts: 10
