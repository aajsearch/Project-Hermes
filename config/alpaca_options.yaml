# Alpaca multi-leg options bot (PCS / CCS / IC). Prefer this file over legacy alpaca_put_spread.yaml.
alpaca_options:
  runtime:
    # paper=True uses Alpaca paper account (safer). Set paper=false only if you want to trade live.
    paper: true
    # When execute=false, orders will not be submitted (still fetches quotes / logs decisions).
    execute: true
    loop_sleep_seconds: 30
    # Per-cycle behavior
    max_entry_retries: 1
    order_fill_timeout_seconds: 60
    order_cancel_timeout_seconds: 5
    # Contract size for the spread (number of option contracts).
    # For bull put spreads with 1:1 leg ratios, this is qty applied to the mleg order.
    order_qty: 10

  # Risk caps (operational safety). Block new entries when daily PnL <= -cap.
  # Set to 0 to disable.
  risk:
    max_daily_loss_dollars: 5000
    max_loss_per_underlying_dollars: 2000
    # Max concurrent spreads per underlying counting open + pending entry across PCS/CCS/IC.
    # Set to 0 to disable only the numeric cap (no-mixing rule still applies when any slot is active).
    max_open_spreads_per_underlying: 1
    # Only hunt/open new positions within this Pacific time window.
    # Timezone is DST-aware via America/Los_Angeles.
    trade_window_timezone: "America/Los_Angeles"
    trade_window_start_time_local: "06:45"
    trade_window_end_time_local: "13:00"
    # Weekdays when the window applies (names in local timezone above). Monday=0 ... Sunday=6.
    # Examples: mon, monday, tue, wed, thu, fri, sat, sun (case-insensitive).
    # Omit this key to default to Monday–Friday only.
    trade_window_weekdays: ["mon", "tue", "wed", "thu", "fri"]

  # Underlyings schedule:
  # - Mon–Fri base list
  # - Mon/Wed/Fri add-on list (traded in addition to the base list on M/W/F)
  underlyings_mon_to_fri: ["QQQ", "SPY", "IWM"]
  underlyings_mon_wed_fri: ["NVDA", "TSLA", "AAPL", "MSFT", "AMZN", "META", "GOOGL", "AVGO"]

  # ---------------------------------------------------------------------------
  # PRODUCTION "SNIPER" PROFILE — High probability, strict filters, low churn.
  # distance_buffer_otm_fraction_of_min_short_otm is active.
  # min_short_otm_percent is set to 0.4% to perfectly align with 0DTE 15-Delta.
  # ---------------------------------------------------------------------------
  strategies:
    put_credit_spread:
      enabled: true
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 0.30   # Reject illiquid chains with wide bid/ask
        iv_max: 2.5            # Avoid extreme market panic/spikes

        long_put:
          delta_abs_min: 0.02
          delta_abs_max: 0.08
          target_delta: -0.05  # Cheap protection

        short_put:
          delta_abs_min: 0.10  # Far OTM, high win-rate (~85% probability)
          delta_abs_max: 0.20
          target_delta: -0.15

      entry:
        target_credit: 0.15    # Demand at least $15 per spread
        entry_operator: ">="
        put_spread_width_points_min: 1.0
        put_spread_width_points_max: 5.0  # Cap max risk tightly
        min_short_otm_percent: 0.004      # FIXED: Require short strike to be at least 0.4% OTM

      exit:
        tp_pct: 0.60           # Let theta decay burn off 60% of the premium
        sl_pct: 1.5            # Stop out if mark hits ~2.5x our entry credit (1 + 1.5)
        exit_cooldown_minutes: 15
        distance_buffer_otm_fraction_of_min_short_otm: 0.80  # Gate unlocks at ~0.32% OTM (0.004 * 0.80)
        exit_before_minutes: 15
        close_limit_slippage_pct: 0.02

    call_credit_spread:
      enabled: true
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 0.30
        iv_max: 2.5

        # Call deltas skewed slightly further OTM due to "melt-up" risk and skew
        long_call:
          delta_abs_min: 0.02
          delta_abs_max: 0.06
          target_delta: 0.04

        short_call:
          delta_abs_min: 0.08
          delta_abs_max: 0.16
          target_delta: 0.12

      entry:
        target_credit: 0.15
        entry_operator: ">="
        call_spread_width_points_min: 1.0
        call_spread_width_points_max: 5.0
        min_short_otm_percent: 0.004      # FIXED: Aligned with 0DTE call pricing

      exit:
        tp_pct: 0.60
        sl_pct: 1.5
        exit_cooldown_minutes: 15
        distance_buffer_otm_fraction_of_min_short_otm: 0.80
        exit_before_minutes: 15
        close_limit_slippage_pct: 0.02

    iron_condor:
      enabled: true
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 0.35   # Slightly looser here to account for 4-leg slippage
        iv_max: 2.5

        long_legs:
          delta_abs_min: 0.02
          delta_abs_max: 0.08
          target_delta: 0.05

        short_legs:
          delta_abs_min: 0.09
          delta_abs_max: 0.15  # Tighter shorts to ensure a wide "sandbox" for the stock
          target_delta: 0.12

      entry:
        target_credit: 0.30    # Combined premium from both wings
        entry_operator: ">="
        wing_width_points_min: 2.0
        wing_width_points_max: 5.0
        min_short_otm_percent: 0.004      # FIXED: Gate distance

      exit:
        tp_pct: 0.50           # ICs are harder to close cleanly. Take profit at 50%.
        sl_pct: 1.5            # Tighter stop loss on ICs to prevent gamma pin risk
        exit_cooldown_minutes: 30
        distance_buffer_otm_fraction_of_min_short_otm: 0.80  # Gate unlocks at ~0.32% OTM (0.004 * 0.80)
        exit_before_minutes: 15 # 4 legs take longer to fill, start trying to exit 15 mins before expiry
        close_limit_slippage_pct: 0.03

  # Backward compatibility: if you omit strategies.put_credit_spread, you may keep flat
  # options / entry / exit at this root level and the loader will treat them as PCS defaults.
