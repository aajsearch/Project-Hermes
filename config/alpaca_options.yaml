# Alpaca multi-leg options bot (PCS / CCS / IC). Prefer this file over legacy alpaca_put_spread.yaml.
alpaca_options:
  runtime:
    # paper=True uses Alpaca paper account (safer). Set paper=false only if you want to trade live.
    paper: true
    # When execute=false, orders will not be submitted (still fetches quotes / logs decisions).
    execute: true
    loop_sleep_seconds: 30
    # Per-cycle behavior
    max_entry_retries: 1
    order_fill_timeout_seconds: 60
    order_cancel_timeout_seconds: 5
    # Contract size for the spread (number of option contracts).
    # For bull put spreads with 1:1 leg ratios, this is qty applied to the mleg order.
    order_qty: 10

  # Risk caps (operational safety). Block new entries when daily PnL <= -cap.
  # Set to 0 to disable.
  risk:
    max_daily_loss_dollars: 500
    max_loss_per_underlying_dollars: 200
    # Only hunt/open new positions within this Pacific time window.
    # Timezone is DST-aware via America/Los_Angeles.
    trade_window_timezone: "America/Los_Angeles"
    trade_window_start_time_local: "06:45"
    trade_window_end_time_local: "13:00"
    # Weekdays when the window applies (names in local timezone above). Monday=0 ... Sunday=6.
    # Examples: mon, monday, tue, wed, thu, fri, sat, sun (case-insensitive).
    # Omit this key to default to Monday–Friday only.
    trade_window_weekdays: ["mon", "tue", "wed", "thu", "fri"]

  # Underlyings schedule:
  # - Mon–Fri base list
  # - Mon/Wed/Fri add-on list (traded in addition to the base list on M/W/F)
  underlyings_mon_to_fri: ["QQQ", "SPY", "IWM"]
  underlyings_mon_wed_fri: ["NVDA", "TSLA", "AAPL", "MSFT", "AMZN", "META", "GOOGL", "AVGO"]

  # Per-strategy tunables. Global runtime + risk stay at root.
  strategies:
    put_credit_spread:
      enabled: true
      # For 0DTE we typically want dte_min=0 and dte_max=0.
      options:
        dte_min: 0
        dte_max: 0
        # Candidate filters (simple MVP defaults; tune later)
        spread_pct_max: 0.30
        iv_max: 2.5

        # Pick the long and short put legs separately.
        # Long cap < short floor avoids overlapping |delta| bands (strike ordering rejects many pairs otherwise).
        long_put:
          # delta bounds passed as absolute values (function converts to negative range internally)
          delta_abs_min: 0.03   # very cheap / far OTM protection
          delta_abs_max: 0.10
          target_delta: -0.06

        short_put:
          delta_abs_min: 0.12   # floor above long max (0.10) — no overlap
          delta_abs_max: 0.25
          target_delta: -0.18

      entry:
        # Net credit mid = mid(short) - mid(long), same units as Alpaca option quotes ($/share).
        # Far-OTM long + ~12–25Δ short collects less than old 40–60Δ short; 0.20 was too tight for many chains.
        # Tune with ALPACA_PUT_SPREAD_DEBUG=1: raise slightly if fills are too eager, lower if no candidates.
        target_credit: 0.10
        entry_operator: ">="   # ">=" or "<="
        # Strike selection guard
        # Bull put credit spread width = short_strike - long_strike
        put_spread_width_points_min: 8.0
        put_spread_width_points_max: 10.0

        # Minimum OTM distance for the SHORT put at entry:
        # short_put_strike <= underlying_spot_mid * (1 - min_short_otm_percent)
        min_short_otm_percent: 0.02

      exit:
        tp_pct: 0.60
        # Stop loss on spread mark (see pricing_logic.tp_sl_triggered):
        #   SL fires when current_net_credit_mid >= entry_net_credit_mid * (1 + sl_pct).
        # sl_pct: 2.0  =>  threshold = entry * 3  =>  exit when the mark reaches 3× entry credit
        # (common "3× credit" risk framing relative to the entry credit mid).
        sl_pct: 2.0
        # After a position is closed (TP/SL), wait this long before hunting
        # for a new entry for the same underlying.
        exit_cooldown_minutes: 15
        # Exit distance buffer expressed as OTM% gating.
        # OTM% is computed as (underlying_mid - short_put_strike) / underlying_mid.
        # We exit (and only then allow TP/SL exits) when:
        #   OTM% <= min_short_otm_percent * distance_buffer_otm_fraction_of_min_short_otm
        # If min_short_otm_percent=0.02 and fraction=0.5 => threshold=0.01 (1%).
        distance_buffer_otm_fraction_of_min_short_otm: 0.50
        # Close before option expiry time in US/Eastern
        exit_before_minutes: 3
        # When closing, submit a debit limit slightly worse than current mark to improve fill probability.
        close_limit_slippage_pct: 0.02

    # --- Call Credit Spread (CCS) — standard 0DTE starting config ---
    # Volatility skew (crash fear → rich puts) and melt-up risk mean short calls are usually
    # placed further OTM (lower delta) than comparable short puts.
    call_credit_spread:
      # Set true to run CCS alongside PCS (separate open state per underlying).
      enabled: false
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 0.30
        iv_max: 2.5

        # Long call serves as structural protection
        long_call:
          delta_abs_min: 0.02
          delta_abs_max: 0.06
          target_delta: 0.04   # positive deltas for calls

        # Short call placed further OTM than the put equivalent
        short_call:
          delta_abs_min: 0.08
          delta_abs_max: 0.16
          target_delta: 0.12

      entry:
        target_credit: 0.15
        entry_operator: ">="
        # Tighter width for better Risk/Reward on ETFs
        call_spread_width_points_min: 1.0
        call_spread_width_points_max: 5.0
        min_short_otm_percent: 0.02

      exit:
        tp_pct: 0.60
        sl_pct: 2.0   # stop at ~3× entry credit (see pricing_logic.tp_sl_triggered)
        exit_cooldown_minutes: 15
        distance_buffer_otm_fraction_of_min_short_otm: 0.50
        exit_before_minutes: 3
        close_limit_slippage_pct: 0.02

    # --- Iron Condor (IC) — standard 0DTE starting config ---
    # Premium on both sides → higher total credit; two short strikes sandbox the underlying.
    # Widen strikes slightly (lower deltas), take profit earlier (4-leg slippage), allow more spread% on quotes.
    iron_condor:
      # Set true to run 4-leg IC (separate open state per underlying).
      enabled: false
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 0.35   # slightly higher tolerance for 4 legs
        iv_max: 2.5

        # Symmetrical delta targeting to balance the wings
        long_legs:
          delta_abs_min: 0.02
          delta_abs_max: 0.08
          target_delta: 0.05

        short_legs:
          delta_abs_min: 0.09
          delta_abs_max: 0.15
          target_delta: 0.12

      entry:
        # Combined credit target (PCS + CCS style total for the full condor)
        target_credit: 0.35
        entry_operator: ">="
        # Keeping wings symmetrical
        wing_width_points_min: 2.0
        wing_width_points_max: 5.0

      exit:
        # Take profit earlier on ICs — avoid late-day gamma / 4-leg slippage
        tp_pct: 0.50
        sl_pct: 1.5   # tighter stop (~2.5× entry credit vs entry)
        exit_cooldown_minutes: 30   # longer cooldown; ICs prefer calmer conditions
        exit_before_minutes: 5   # close slightly earlier for 4-leg liquidity
        close_limit_slippage_pct: 0.03   # higher slippage tolerance on close

  # Backward compatibility: if you omit strategies.put_credit_spread, you may keep flat
  # options / entry / exit at this root level and the loader will treat them as PCS defaults.
