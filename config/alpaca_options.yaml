# Alpaca multi-leg options bot (PCS / CCS / IC). Prefer this file over legacy alpaca_put_spread.yaml.
alpaca_options:
  runtime:
    # paper=True uses Alpaca paper account (safer). Set paper=false only if you want to trade live.
    paper: true
    # When execute=false, orders will not be submitted (still fetches quotes / logs decisions).
    execute: true
    loop_sleep_seconds: 30
    # Per-cycle behavior
    max_entry_retries: 1
    order_fill_timeout_seconds: 60
    order_cancel_timeout_seconds: 5
    # Contract size for the spread (number of option contracts).
    # For bull put spreads with 1:1 leg ratios, this is qty applied to the mleg order.
    order_qty: 10

  # Risk caps (operational safety). Block new entries when daily PnL <= -cap.
  # Set to 0 to disable.
  risk:
    max_daily_loss_dollars: 5000
    max_loss_per_underlying_dollars: 2000
    # Only hunt/open new positions within this Pacific time window.
    # Timezone is DST-aware via America/Los_Angeles.
    trade_window_timezone: "America/Los_Angeles"
    trade_window_start_time_local: "06:45"
    trade_window_end_time_local: "13:00"
    # Weekdays when the window applies (names in local timezone above). Monday=0 ... Sunday=6.
    # Examples: mon, monday, tue, wed, thu, fri, sat, sun (case-insensitive).
    # Omit this key to default to Monday–Friday only.
    trade_window_weekdays: ["mon", "tue", "wed", "thu", "fri"]

  # Underlyings schedule:
  # - Mon–Fri base list
  # - Mon/Wed/Fri add-on list (traded in addition to the base list on M/W/F)
  underlyings_mon_to_fri: ["QQQ", "SPY", "IWM"]
  underlyings_mon_wed_fri: ["NVDA", "TSLA", "AAPL", "MSFT", "AMZN", "META", "GOOGL", "AVGO"]

  # ---------------------------------------------------------------------------
  # PAPER STRESS TEST PROFILE — "machine gun" (high churn, loose filters).
  # Revert to conservative defaults before live. distance_buffer × min_otm = 10%
  # gate → TP/SL evaluated on first tick after entry for typical 0DTE strikes.
  # ---------------------------------------------------------------------------
  strategies:
    put_credit_spread:
      enabled: true
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 1.0    # STRESS: ignore wide bid/ask
        iv_max: 5.0            # STRESS: ignore IV spikes

        long_put:
          delta_abs_min: 0.01
          delta_abs_max: 0.15
          target_delta: -0.06

        short_put:
          delta_abs_min: 0.16   # floor just above long max
          delta_abs_max: 0.45   # STRESS: allow near-the-money shorts
          target_delta: -0.30

      entry:
        target_credit: 0.05    # STRESS: accept tiny credits to force entries
        entry_operator: ">="
        put_spread_width_points_min: 1.0
        put_spread_width_points_max: 20.0
        min_short_otm_percent: 0.001   # STRESS: allow essentially ATM shorts

      exit:
        tp_pct: 0.10           # STRESS: 10% profit exit (fast)
        sl_pct: 0.5            # STRESS: 50% loss exit (fast)
        exit_cooldown_minutes: 1
        # 0.001 * 100 => 10% OTM threshold → gate opens immediately for normal shorts
        distance_buffer_otm_fraction_of_min_short_otm: 100.0
        exit_before_minutes: 3
        close_limit_slippage_pct: 0.05

    call_credit_spread:
      enabled: true            # STRESS: on
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 1.0
        iv_max: 5.0

        long_call:
          delta_abs_min: 0.01
          delta_abs_max: 0.15
          target_delta: 0.06

        short_call:
          delta_abs_min: 0.16
          delta_abs_max: 0.45
          target_delta: 0.30

      entry:
        target_credit: 0.05
        entry_operator: ">="
        call_spread_width_points_min: 1.0
        call_spread_width_points_max: 20.0
        min_short_otm_percent: 0.001

      exit:
        tp_pct: 0.10
        sl_pct: 0.5
        exit_cooldown_minutes: 1
        distance_buffer_otm_fraction_of_min_short_otm: 100.0
        exit_before_minutes: 3
        close_limit_slippage_pct: 0.05

    iron_condor:
      enabled: true            # STRESS: on
      options:
        dte_min: 0
        dte_max: 0
        spread_pct_max: 1.5    # STRESS: 4-leg quote tolerance
        iv_max: 5.0

        long_legs:
          delta_abs_min: 0.01
          delta_abs_max: 0.15
          target_delta: 0.05

        short_legs:
          delta_abs_min: 0.16
          delta_abs_max: 0.35  # slightly tighter so wings do not overlap
          target_delta: 0.20

      entry:
        target_credit: 0.10
        entry_operator: ">="
        wing_width_points_min: 1.0
        wing_width_points_max: 20.0
        # Align exit OTM gate math with PCS/CCS (IC selector does not filter on this today)
        min_short_otm_percent: 0.001

      exit:
        tp_pct: 0.05           # STRESS: condors move slower — tighter TP
        sl_pct: 0.3            # STRESS: 30% loss exit
        exit_cooldown_minutes: 2
        distance_buffer_otm_fraction_of_min_short_otm: 100.0
        exit_before_minutes: 3
        close_limit_slippage_pct: 0.08

  # Backward compatibility: if you omit strategies.put_credit_spread, you may keep flat
  # options / entry / exit at this root level and the loader will treat them as PCS defaults.
