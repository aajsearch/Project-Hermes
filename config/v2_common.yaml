# V2 strict schema: required by v2_config_loader
mode: TRADE
run_mode: both

# Use Kalshi WebSocket for market + orderbook when true; when false, pipeline uses REST only.
# Override with env: KALSHI_USE_WS=0 or KALSHI_USE_WS=false to disable WS.
use_kalshi_ws: true

# When true, pipeline runs and strategies fire but no real Kalshi orders are placed.
# Set to false for live trading. Can override with env V2_DRY_RUN=false.
dry_run: false

intervals:
  fifteen_min:
    enabled: true
    assets: [btc, eth, sol, xrp]
    mode: TRADE
  hourly:
    enabled: false
    assets: [btc, eth, sol, xrp]
    mode: TRADE

caps:
  cap_scope: per_side
  fifteen_min:
    max_orders_per_ticker: 10
    max_total_orders_per_15min: 50
  hourly:
    max_orders_per_ticker: 5
    max_total_orders_per_hour: 50

no_trade_windows:
  enabled: false
  timezone: America/Los_Angeles
  windows: []

# Feature flags (V2-only). Default safe: nothing enabled.
feature_flags:
  v2_hourly:
    # Enable V2 hourly trading per asset (e.g. [btc] for canary). Empty = off.
    enabled_assets: []
    # When true, V2 hourly evaluates and logs but does not place orders (in addition to global dry_run).
    shadow_mode: false

# Rollout controls (default: V2 hourly disabled everywhere)
feature_flags:
  v2_hourly:
    # When non-empty: only these assets run V2 hourly strategies (per-asset canary).
    # Example: [btc] to canary BTC only.
    enabled_assets: []
    # When true: hourly pipeline runs but executor is forced to dry-run for hourly only,
    # and the strategy logs parity/decision telemetry for comparison.
    shadow_mode: false
