# V2 hourly: pipeline + strategies (strict schema)
hourly:
  pipeline:
    # Sleep after each full multi-asset cycle (not per asset). Use 0 to avoid an extra fixed delay.
    run_interval_seconds: 0
    # When >1, hourly runs BTC/ETH (etc.) in parallel threads so cycle wall time is closer to one asset’s fetch cost.
    parallel_asset_workers: 2
    # For hourly events, Kalshi often has multiple event tickers per asset:
    # - primary (above/below)
    # - range (bucketed band)
    # Configure which event(s) to include per asset.
    #
    # Modes:
    # - primary_only: only the primary hourly event (get_current_hour_market_id)
    # - range_only: only the range hourly event (when it exists)
    # - both: include both primary + range (default legacy-like for btc/eth/sol/xrp)
    #
    # NOTE: doge often only has a range event; primary_only will effectively evaluate nothing for doge.
    event_mode_by_asset:
      btc: primary_only
      eth: primary_only
      sol: both
      xrp: both
      doge: range_only
    # Priority when multiple strategies emit on the same tick (first wins). If you enable hourly_last_90s_limit_99,
    # list it first so it wins in the final seconds: [hourly_last_90s_limit_99, hourly_signals_farthest]
    strategy_priority: [hourly_signals_farthest]

  strategies:
    # Regular legacy hourly loop: eligible tickers near spot, farthest (or all-in-range) selection,
    # risk guards, and hourly exit criteria.
    hourly_signals_farthest:
      enabled: true
      # Aligned with fifteen_min continuous_alpha_limit_99: limit buy at 99¢ once bid passes floor.
      limit_price_cents: 99
      # Position sizing + spend cap (same idea as v2_fifteen_min.yaml)
      order_count: { btc: 15, eth: 5, sol: 1, xrp: 1, doge: 1 }
      max_cost_cents: { btc: 500000, eth: 20000, sol: 500, xrp: 500, doge: 500 }
      # Max entry orders this strategy may place per (asset, hourly window).
      max_orders_per_window: 2
      # Only late_window_minutes is read by V2 (hourly_signals_farthest). Loop cadence is hourly.pipeline.run_interval_seconds.
      entry_window:
        late_window_minutes: 7

      selection:
        # Mirror legacy config/hourly.yaml + common.yaml
        pick_all_in_range: false
        spot_window_default: 1500
        spot_window_by_asset:
          btc: 1500
          eth: 200
          sol: 50
          xrp: 1
          doge: 0.005
        # Min bid on chosen side before entry (YES >= 94, NO >= 95); max 99 matches limit-99 style band.
        thresholds_yes: { min: 97, max: 99 }
        thresholds_no: { min: 97, max: 99 }

      guards:
        enabled: true
        no_new_entry_cutoff_seconds: 60
        persistence_polls: 1
        late_persistence_override:
          enabled: false
        stop_once_disable:
          enabled: true
          max_stopouts_per_ticker: 1
        recent_cross:
          enabled: true
          from_below_cents: 90
          to_at_least_cents: 94
          extra_persistence_polls: 1
        distance_buffer:
          enabled: true
          assets:
            btc: { pct: 0.0011, floor_usd: 120}
            eth: { pct: 0.0032, floor_usd: 8 }
        anchor_one_per_side:
          enabled: true
          lock_per_window: true
          lock_on_stop_loss_only: true
          recent_cross_penalty: 999
        stoploss_roll_reentry:
          enabled: true
          ask_min_cents: 75
          ask_max_cents: 98
          order_size_multiplier: 5

      exit:
        # Per filled position: if current bid for that side is down >= this vs entry bid, exit (after persistence if >1).
        # Use either a fraction (0.20 = 20%) or percent points (20 = 20%) — same convention as fifteen_min-friendly configs.
        stop_loss_pct: 0.70
        stop_loss_persistence_polls: 2
        # When SL triggers at cur_bid, place IOC reduce-only sell with limit = max(1, cur_bid - offset).
        stop_loss_limit_offset_cents: 10
        # SL probe telemetry (forensics): throttled visibility into entry_bid/cur_bid/loss_frac per filled order.
        # Exit evaluation is scoped to the active hourly event (current market_id); prior windows are not tracked.
        evaluation_interval_seconds: 0
        hard_flip_exit:
          enabled: false
          enable_only_if_seconds_to_close_lte: 120

    # Hourly last-90s limit strategy (legacy: hourly_last_90s_limit_99 thread)
    hourly_last_90s_limit_99:
      enabled: false
      window_seconds: 75
      run_interval_seconds: 1

      limit_price_cents: 99
      min_bid_cents: 94
      side: both

      # Position sizing + spend cap (same idea as v2_fifteen_min.yaml)
      order_count: { btc: 150, eth: 150, sol: 150, xrp: 150, doge: 150 }

      stop_loss_pct: 15
      stop_loss_distance_factor: 0.75

      max_yes_per_market: 3
      max_no_per_market: 3
      max_cost_cents: 100
      max_cost_cents_by_asset:
        btc: 100
        eth: 100
        sol: 100
        xrp: 100
        doge: 100
      min_distance_at_placement:
        btc: 80
        eth: 7.5
        sol: 0.3
        xrp: 0.07
        doge: 0.0017
